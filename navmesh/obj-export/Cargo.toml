[package]
name = "navmesh-obj-export"
description = "CLI to generate a .obj file from ForgeLight terrain chunks to use for navmesh creation."
authors = ["soir20"]
version = "1.0.0"
edition = "2024"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
asset_serialize = { git = "https://github.com/soir20/oxide", rev = "1ef04b2a118bc9846528af39b9bb3263ea7a8336" }
clap = { version = "4.6.0", features = ["derive"] }
kiddo = "5.3.0"
tokio = { version = "1.50.0", features = ["fs", "io-util", "macros", "rt", "rt-multi-thread"] }
